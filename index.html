    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style type="text/css">
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            overscroll-behavior: none; 
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- DESKTOP LAYOUT --- */
        .wrapper {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            height: calc(100% - 55px); 
            overflow: hidden; 
        }

        iframe {
            width: 100%;
            height: calc(100% + 45px); 
            border: none;
            display: block;
        }

        .carousel-bar {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 55px;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0; 
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            z-index: 1000;
            box-sizing: border-box;
            padding: 0 15px;
        }

        .carousel-count {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 6px 12px;
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .carousel-content {
            flex-grow: 1;
            padding: 0 20px;
            text-align: center;
            font-size: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        .comment-text {
            font-style: italic;
            color: #475569; 
            cursor: pointer;
            transition: color 0.2s;
            display: block;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            box-sizing: border-box;
        }

        .comment-text:hover {
            color: #0f172a;
            text-decoration: underline;
        }

        .carousel-controls {
            display: flex;
            gap: 5px;
        }

        .carousel-controls button {
            background: none;
            border: none;
            color: #94a3b8; 
            font-size: 14px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .carousel-controls button:hover {
            color: #0f172a;
            background-color: #f1f5f9;
        }

        /* --- STABLE UNIFIED MODAL ARCHITECTURE --- */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(15, 23, 42, 0.6); 
            z-index: 2000;
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(3px); 
        }

        .modal-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border-radius: 8px;
            max-width: 85%;
            width: 680px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            box-sizing: border-box;
            padding: 20px 10px;
        }

        .modal-content {
            flex-grow: 1;
            padding: 20px 15px;
            max-height: 70vh;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.6;
            color: #1e293b;
            font-style: italic;
            text-align: center;
        }

        .modal-close {
            position: absolute;
            top: 10px; 
            right: 15px;
            cursor: pointer;
            font-size: 24px;
            color: #94a3b8;
            transition: color 0.2s;
            z-index: 2100;
        }

        .modal-close:hover {
            color: #e53e3e;
        }

        /* Permanently Pinned Center-Aligned Navigation Buttons */
        .modal-nav-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            flex-shrink: 0;
        }

        .modal-nav-btn:hover {
            color: #0f172a;
            background-color: #f1f5f9;
        }

        /* --- MOBILE LAYOUT OVERRIDES --- */
        @media (max-width: 650px) {
            .wrapper {
                height: calc(100% - 80px); 
            }
            .carousel-bar {
                height: 80px; 
                flex-wrap: wrap; 
                padding: 8px 15px;
                align-content: space-between;
            }
            .carousel-count {
                order: 1; 
                font-size: 12px;
                padding: 3px 6px;
            }
            .carousel-controls {
                order: 2; 
            }
            .carousel-content {
                order: 3; 
                width: 100%;
                padding: 0;
                display: block;
                text-align: center; 
                font-size: 13.5px;
                box-sizing: border-box;
                margin-bottom: 2px;
            }
            .comment-text {
                white-space: normal; 
                text-align: center;
                display: -webkit-box;
                -webkit-line-clamp: 2; 
                -webkit-box-orient: vertical;
                overflow: hidden;
                text-overflow: ellipsis; 
            }

            /* Optimized inside-the-box spacing configurations for mobile screen bounds */
            .modal-wrapper {
                max-width: 95%;
                width: 100%;
                padding: 15px 5px;
            }
            .modal-content {
                font-size: 15px;
                padding: 15px 5px;
                max-height: 60vh;
            }
            .modal-nav-btn {
                font-size: 20px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    
    <div class="wrapper">
        <iframe id="main-form" width="100%" frameborder="0" marginheight="0" marginwidth="0" title="Vote of No Confidence in Superintendent Dr. Robert Shaps"></iframe>
    </div>

    <div class="carousel-bar">
        <div class="carousel-count">
            <span id="supporter-count">...</span>&nbsp;Supporters
        </div>
        
        <div class="carousel-content" id="active-comment">
            Loading community comments...
        </div>

        <div class="carousel-controls">
            <button id="btn-prev" title="Previous Comment">◀</button>
            <button id="btn-pause" title="Pause/Play">⏸</button>
            <button id="btn-next" title="Next Comment">▶</button>
        </div>
    </div>

    <div id="comment-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-wrapper" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            
            <button class="modal-nav-btn" id="modal-btn-prev" title="Previous Comment">◀</button>
            
            <div id="modal-text" class="modal-content"></div>
            
            <button class="modal-nav-btn" id="modal-btn-next" title="Next Comment">▶</button>
        </div>
    </div>

    <script async src="https://tally.so/widgets/embed.js"></script>

    <script>
        const _0xdata = [
            "aHR0cHM6Ly9kb2NzLmdvb2dsZS5",
            "jb20vc3ByZWFkc2hlZXRzL2QvZS",
            "8yUEFDWC0xdlRpZjlrcEZFTlRTc",
            "zEwblVpZHNfN0NLb3p2al9fZHY4",
            "ZmxienIyaHI3a1RWZGlrMGlIbDN",
            "xT1VTM0hXeHdoV05zNzNIZXZBMW",
            "lxNDUwWi9wdWI/Z2lkPTYwMTE4M",
            "jIwMyZzaW5nbGU9dHJ1ZSZvdXRw",
            "dXQ9Y3N2"
        ];
        const _0xform = [
            "aHR0cHM6Ly90YWxseS5zby9yL1",
            "BkdmpPYj90cmFuc3BhcmVudEJh",
            "Y2tncm91bmQ9MSZmb3JtRXZlbn",
            "RzRm9yd2FyZGluZz0x"
        ];
        
        const rawCsvUrl = atob(_0xdata.join(''));
        const formUrl = atob(_0xform.join(''));
        const csvUrl = rawCsvUrl + "&t=" + new Date().getTime();

        document.getElementById('main-form').setAttribute('data-tally-src', formUrl);

        let commentsArray = [];
        let shuffledDeck = []; 
        let currentIndex = 0;
        let carouselTimer = null;
        let isPaused = false;

        fetch(csvUrl)
            .then(response => response.text())
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    complete: function(results) {
                        const data = results.data;
                        
                        if(data.length > 0 && data[0]['Total Supporters']) {
                            let trueCount = parseInt(data[0]['Total Supporters'].replace(/,/g, ''), 10);
                            if(!isNaN(trueCount)) {
                                document.getElementById('supporter-count').innerText = trueCount.toLocaleString();
                            }
                        }

                        data.forEach(row => {
                            if(row['Comments'] && row['Comments'].trim() !== '') {
                                commentsArray.push(row['Comments'].trim());
                            }
                        });

                        if(commentsArray.length > 0) {
                            shuffledDeck = [...commentsArray];
                            
                            for (let i = shuffledDeck.length - 1; i > 0; i--) {
                                const j = Math.floor(Math.random() * (i + 1));
                                [shuffledDeck[i], shuffledDeck[j]] = [shuffledDeck[j], shuffledDeck[i]];
                            }

                            currentIndex = 0;
                            showComment(currentIndex);
                            startTimer();
                        } else {
                            document.getElementById('active-comment').innerHTML = "<span class='comment-text'>No comments yet.</span>";
                        }
                    }
                });
            })
            .catch(error => {
                console.error("Error loading file:", error);
                document.getElementById('active-comment').innerHTML = "<span class='comment-text'>Unable to load comments.</span>";
            });

        function showComment(index) {
            if(shuffledDeck.length === 0) return;
            
            if(index >= shuffledDeck.length) {
                currentIndex = 0;
            } else if(index < 0) {
                currentIndex = shuffledDeck.length - 1;
            } else {
                currentIndex = index;
            }

            let rawComment = shuffledDeck[currentIndex];
            document.getElementById('active-comment').innerHTML = 
                `<span class="comment-text" onclick="openModal()" title="Click to read full comment">"${rawComment}"</span>`;
                
            // Sync text seamlessly if modal remains actively mounted across navigation clicks
            if(document.getElementById('comment-modal').style.display === 'flex') {
                document.getElementById('modal-text').innerText = '"' + rawComment + '"';
            }
        }

        function startTimer() {
            clearInterval(carouselTimer);
            if (isPaused || shuffledDeck.length === 0) return;

            carouselTimer = setInterval(() => {
                showComment(currentIndex + 1);
            }, 7000); 
        }

        function resetTimer() {
            startTimer();
        }

        function openModal() {
            clearInterval(carouselTimer);
            document.getElementById('modal-text').innerText = '"' + shuffledDeck[currentIndex] + '"';
            document.getElementById('comment-modal').style.display = 'flex';
            
            isPaused = true;
            document.getElementById('btn-pause').innerText = '▶';
        }

        function closeModal() {
            document.getElementById('comment-modal').style.display = 'none';
            
            isPaused = false;
            document.getElementById('btn-pause').innerText = '⏸';
            startTimer();
        }

        // Bottom Bar Control Handlers
        document.getElementById('btn-next').addEventListener('click', () => {
            showComment(currentIndex + 1);
            resetTimer(); 
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            showComment(currentIndex - 1);
            resetTimer();
        });

        // Locked Modal Internal Navigation Arrow Handlers
        document.getElementById('modal-btn-next').addEventListener('click', () => {
            showComment(currentIndex + 1);
        });

        document.getElementById('modal-btn-prev').addEventListener('click', () => {
            showComment(currentIndex - 1);
        });

        document.getElementById('btn-pause').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? '▶' : '⏸';
            e.target.title = isPaused ? 'Play' : 'Pause';
            if (isPaused) {
                clearInterval(carouselTimer);
            } else {
                startTimer();
            }
        });
    </script>

</body>
</html>
