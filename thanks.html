    <style type="text/css">
        /* This container acts as a 'window' that is exactly the size of the screen */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* This prevents the user from scrolling past the crop */
            overscroll-behavior: none; /* This prevents the "bounce" that reveals the badge on mobile */

        /* The wrapper is the 'frame' that crops the iframe */
        .wrapper {

            top: 0;
            left: 0;

            height: 100%;
            overflow: hidden; 
        }

        iframe {
            width: 100%;

            display: block;
        }
